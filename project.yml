name: Bike
options:
  bundleIdPrefix: com.bochen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "S3FN5BW9QG"
    CODE_SIGN_STYLE: Automatic
    # iPhone-only（M6 加 watchOS target 时另配）
    TARGETED_DEVICE_FAMILY: "1"

packages:
  CyclingDomain:
    path: Packages/CyclingDomain

targets:
  Bike:
    type: application
    platform: iOS
    sources:
      - path: Bike/Sources
        excludes:
          - "**/.DS_Store"
    info:
      path: Bike/Info.plist
      properties:
        CFBundleName: "快乐轻骑"
        CFBundleDisplayName: "快乐轻骑"
        CFBundleDevelopmentRegion: en
        CFBundleIdentifier: "com.bochen.bike"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: "AccentColor"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSMotionUsageDescription: "用于在后台被动识别你的骑行，自动记录骑行时长与时间，全程在设备本地处理。"
        NSLocationWhenInUseUsageDescription: "用于在骑行时记录距离、速度与路线轨迹。"
        NSLocationAlwaysAndWhenInUseUsageDescription: "允许「始终」定位后，App 才能在你开始骑行时自动唤醒并记录路线，无需手动开始。位置数据仅存于设备本地。"
        NSHealthShareUsageDescription: "用于读取你的心率，识别 iPhone 动作分类不出的运动（如器械训练）并自动记录。仅在设备本地处理。"
        NSHealthUpdateUsageDescription: "用于把检测到的运动写回 Apple 健康（含距离、卡路里与路线），与系统运动数据汇总。"
        UIBackgroundModes:
          - location
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.bochen.bike.reconcile
    dependencies:
      - package: CyclingDomain
        product: CyclingDomain
    entitlements:
      path: Bike/Bike.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        INFOPLIST_FILE: Bike/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bochen.bike
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1"

  BikeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Bike/Tests
    dependencies:
      - target: Bike
      - package: CyclingDomain
        product: CyclingDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bochen.bike.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Bike:
    build:
      targets:
        Bike: all
        BikeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BikeTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
