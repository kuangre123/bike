name: Bike
options:
  bundleIdPrefix: com.bochen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "S3FN5BW9QG"
    CODE_SIGN_STYLE: Automatic
    # iPhone-only（M6 加 watchOS target 时另配）
    TARGETED_DEVICE_FAMILY: "1"

packages:
  CyclingDomain:
    path: Packages/CyclingDomain

targets:
  Bike:
    type: application
    platform: iOS
    sources:
      - path: Bike/Sources
        excludes:
          - "**/.DS_Store"
    info:
      path: Bike/Info.plist
      properties:
        CFBundleName: "Bike"
        CFBundleDisplayName: "Bike"
        CFBundleDevelopmentRegion: en
        CFBundleIdentifier: "com.bochen.bike"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: "AccentColor"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    dependencies:
      - package: CyclingDomain
        product: CyclingDomain
    settings:
      base:
        INFOPLIST_FILE: Bike/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.bochen.bike
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1"

  BikeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Bike/Tests
    dependencies:
      - target: Bike
      - package: CyclingDomain
        product: CyclingDomain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bochen.bike.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Bike:
    build:
      targets:
        Bike: all
        BikeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BikeTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
